<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120" role="img" aria-label="Delivery System Logo">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(10,10)">
    <!-- Rounded badge -->
    <rect x="0" y="0" rx="28" ry="28" width="92" height="92"
          fill="#2563eb" fill-opacity="0.08"
          stroke="#2563eb" stroke-width="3"/>

    <!-- Box -->
    <g transform="translate(20,18)">
      <rect x="0" y="18" width="52" height="40" rx="10" fill="url(#g1)" />
      <path d="M10 18 L26 6 L42 18" fill="none" stroke="url(#g2)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="14" y="30" width="24" height="22" rx="6" fill="#ffffff" opacity="0.9"/>
      <path d="M20 41 H32" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    </g>

    <!-- Small DS -->
    <text x="46" y="85" text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-weight="800" font-size="20" fill="#1d4ed8">DS</text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(120,40)">
    <text x="0" y="26"
          font-family="Arial, Helvetica, sans-serif"
          font-size="36" font-weight="900" fill="#0f172a">
      Delivery System
    </text>
    <text x="0" y="52"
          font-family="Arial, Helvetica, sans-serif"
          font-size="16" font-weight="700"
          fill="#0f172a" fill-opacity="0.55">
      Dashboard &amp; Logistics
    </text>
  </g>
</svg>